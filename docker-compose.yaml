services:
  redis:
    image: redis/redis-stack-server:latest
    container_name: redis-stack-server
    ports:
      - "6379:6379"
      - "8001:8001" # Redis Insight (GUI)
  app-controller:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ungame-app-controller
    container_name: app-controller
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
